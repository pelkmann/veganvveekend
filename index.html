<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vegan vveekend</title>
  <meta name="description" content="vegan vveekend – Vegane Events, Termine und Community">
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --mint: #2dd4a0;
      --mint-light: #5eead4;
      --mint-dark: #16a87a;
      --dark: #1a2e28;
      --dark-soft: #243b34;
      --text: #0f1f1a;
      --white: #f0fdf8;
      --glass: rgba(45, 212, 160, 0.08);
      --glass-border: rgba(45, 212, 160, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(45, 212, 160, 0.25), transparent),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(45, 212, 160, 0.1), transparent),
        radial-gradient(ellipse 50% 40% at 10% 60%, rgba(94, 234, 212, 0.08), transparent);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    /* Grain texture overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Logo */
    .logo-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .logo-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(45, 212, 160, 0.3), transparent 70%);
      border-radius: 50%;
      filter: blur(20px);
      animation: glow 4s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { opacity: 0.5; transform: scale(0.95); }
      100% { opacity: 0.8; transform: scale(1.05); }
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 2rem;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 2px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Title */
    .title {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--mint-light), var(--mint));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(240, 253, 248, 0.5);
      font-weight: 400;
      margin-bottom: 2.5rem;
      text-align: center;
      line-height: 1.6;
      max-width: 380px;
    }

    /* Section headers */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--mint);
      margin-bottom: 1rem;
      align-self: flex-start;
      width: 100%;
    }

    /* Linktree cards */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      text-decoration: none;
      color: var(--white);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .link-card:hover {
      background: rgba(45, 212, 160, 0.15);
      border-color: rgba(45, 212, 160, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45, 212, 160, 0.12);
    }

    .link-card:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 0.75rem;
      background: rgba(45, 212, 160, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--mint);
    }

    .link-content {
      flex: 1;
      min-width: 0;
    }

    .link-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .link-desc {
      font-size: 0.8rem;
      color: rgba(240, 253, 248, 0.45);
      margin-top: 0.15rem;
    }

    .link-arrow {
      color: rgba(240, 253, 248, 0.2);
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow {
      color: var(--mint);
      transform: translateX(3px);
    }

    /* Event highlight card */
    .event-card {
      width: 100%;
      padding: 1.5rem;
      background: linear-gradient(135deg, rgba(45, 212, 160, 0.12), rgba(45, 212, 160, 0.04));
      border: 1px solid rgba(45, 212, 160, 0.25);
      border-radius: 1.25rem;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--mint), transparent);
    }

    .event-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mint);
      margin-bottom: 0.75rem;
    }

    .event-badge .dot {
      width: 6px;
      height: 6px;
      background: var(--mint);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .event-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .event-details {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .event-detail {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: rgba(240, 253, 248, 0.7);
    }

    .event-detail svg {
      width: 16px;
      height: 16px;
      fill: var(--mint);
      flex-shrink: 0;
    }

    .link-card-wrapper {
      display: flex;
      flex-direction: column;
    }

    .link-location {
      padding: 0.5rem 1.25rem 0.6rem 4.5rem;
      margin-top: -0.25rem;
    }

    .location-link,
    .location-text {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: rgba(240, 253, 248, 0.45);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .location-link svg,
    .location-text svg {
      width: 13px;
      height: 13px;
      fill: var(--mint);
      opacity: 0.6;
      flex-shrink: 0;
    }

    .location-link:hover {
      color: var(--mint);
    }

    .location-link:hover svg {
      opacity: 1;
    }

    .ical-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--mint);
      background: rgba(45, 212, 160, 0.08);
      border: 1px solid rgba(45, 212, 160, 0.2);
      border-radius: 0.5rem;
      padding: 0.3rem 0.65rem;
      margin-left: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .ical-btn svg {
      width: 12px;
      height: 12px;
      fill: var(--mint);
    }

    .ical-btn:hover {
      background: rgba(45, 212, 160, 0.18);
      border-color: var(--mint);
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(240, 253, 248, 0.2);
    }

    .footer a {
      color: rgba(240, 253, 248, 0.3);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--mint);
    }

    /* Fade-in animation */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.1s; }
    .fade-up:nth-child(3) { animation-delay: 0.15s; }
    .fade-up:nth-child(4) { animation-delay: 0.2s; }
    .fade-up:nth-child(5) { animation-delay: 0.25s; }
    .fade-up:nth-child(6) { animation-delay: 0.3s; }
    .fade-up:nth-child(7) { animation-delay: 0.35s; }
    .fade-up:nth-child(8) { animation-delay: 0.4s; }
    .fade-up:nth-child(9) { animation-delay: 0.45s; }
    .fade-up:nth-child(10) { animation-delay: 0.5s; }

    /* Gallery slider */
    .gallery {
      width: 100%;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .slider {
      position: relative;
      overflow: hidden;
      border-radius: 1.25rem;
      border: 1px solid var(--glass-border);
      aspect-ratio: 16 / 10;
      background: var(--glass);
    }

    .slider-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
      will-change: transform;
    }

    .slider-track.dragging {
      transition: none;
    }

    .slider-slide {
      min-width: 100%;
      height: 100%;
    }

    .slider-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(26, 46, 40, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 3;
    }

    .slider-btn:hover {
      background: rgba(45, 212, 160, 0.25);
      border-color: var(--mint);
    }

    .slider-btn.prev { left: 0.75rem; }
    .slider-btn.next { right: 0.75rem; }

    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .slider-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(240, 253, 248, 0.15);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: all 0.3s ease;
    }

    .slider-dot.active {
      background: var(--mint);
      transform: scale(1.3);
    }

    .slider-caption {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(240, 253, 248, 0.4);
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.25rem 3rem;
      }
      .title {
        font-size: 1.8rem;
      }
      .logo {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grain"></div>

  <div class="container">

    <!-- Logo -->
    <div class="logo-wrapper fade-up">
      <div class="logo-glow"></div>
      <img src="logo.jpg" alt="vegan vveekend Logo" class="logo">
    </div>

    <!-- Title -->
    <h1 class="title fade-up">vegan vveekend</h1>
    <p class="subtitle fade-up" id="tagline"></p>

    <!-- Dynamic content loaded from data.json -->
    <div id="content"></div>

    <!-- Footer -->
    <footer class="footer fade-up">
      &copy; 2025 vegan vveekend
    </footer>

    <script>
      const ICONS = {
        calendar: '<svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>',
        location: '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
        ticket: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
        instagram: '<svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>',
        twitter: '<svg viewBox="0 0 24 24"><path d="M22.46 6c-.85.38-1.78.64-2.73.76 1-.6 1.76-1.54 2.12-2.67-.93.55-1.96.95-3.06 1.17-.88-.94-2.13-1.53-3.51-1.53-2.66 0-4.81 2.16-4.81 4.81 0 .38.04.75.13 1.1-4-.2-7.58-2.11-9.96-5.02-.42.72-.66 1.56-.66 2.46 0 1.68.85 3.16 2.14 4.02-.79-.02-1.53-.24-2.18-.6v.06c0 2.35 1.67 4.31 3.88 4.76-.4.1-.83.16-1.27.16-.31 0-.62-.03-.92-.08.63 1.96 2.45 3.39 4.61 3.43-1.69 1.32-3.83 2.1-6.15 2.1-.4 0-.8-.02-1.19-.07 2.19 1.4 4.78 2.22 7.57 2.22 9.07 0 14.02-7.52 14.02-14.02 0-.21 0-.42-.01-.63.96-.69 1.79-1.56 2.45-2.55z"/></svg>',
        youtube: '<svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>',
        tiktok: '<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.75a8.18 8.18 0 0 0 4.78 1.53V6.84a4.84 4.84 0 0 1-1.02-.15z"/></svg>',
        facebook: '<svg viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/></svg>',
        map: '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
        download: '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>',
        link: '<svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>'
      };

      const ARROW = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      function generateIcal(item) {
        const cal = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//vegan vveekend//DE',
          'BEGIN:VEVENT',
          'DTSTART:' + item.ical.start,
          'DTEND:' + item.ical.end,
          'SUMMARY:' + item.title,
          'LOCATION:' + item.ical.address,
          'DESCRIPTION:' + item.title + ' – ' + item.desc,
          'END:VEVENT',
          'END:VCALENDAR'
        ].join('\r\n');
        const blob = new Blob([cal], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = item.title.replace(/\s+/g, '-').toLowerCase() + '.ics';
        a.click();
        URL.revokeObjectURL(url);
      }

      function renderLinkCard(item, external) {
        const icon = ICONS[item.icon] || ICONS.link;
        const target = external ? ' target="_blank" rel="noopener"' : '';
        let locationHtml = '';
        if (item.location) {
          const locContent = item.mapUrl
            ? `<a href="${esc(item.mapUrl)}" target="_blank" rel="noopener" class="location-link">${ICONS.map}${esc(item.location)}</a>`
            : `<span class="location-text">${ICONS.map}${esc(item.location)}</span>`;
          const icalBtn = item.ical
            ? `<button class="ical-btn" data-ical='${JSON.stringify(item.ical).replace(/'/g, "&#39;")}' data-title="${esc(item.title)}" data-desc="${esc(item.desc)}">${ICONS.download} Zum Kalender hinzufügen</button>`
            : '';
          locationHtml = `<div class="link-location">${locContent}${icalBtn}</div>`;
        }
        return `<div class="link-card-wrapper">
          <a href="${esc(item.url)}" class="link-card"${target}>
            <div class="link-icon">${icon}</div>
            <div class="link-content">
              <div class="link-title">${esc(item.title)}</div>
              <div class="link-desc">${esc(item.desc)}</div>
            </div>
            <div class="link-arrow">${ARROW}</div>
          </a>${locationHtml}
        </div>`;
      }

      fetch('data.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById('tagline').textContent = data.tagline;

          let html = '';

          // Gallery slider
          if (data.gallery && data.gallery.length) {
            const slides = data.gallery.map(img =>
              `<div class="slider-slide"><img src="${esc(img.src)}" alt="${esc(img.alt)}" loading="lazy"></div>`
            ).join('');
            const dots = data.gallery.map((_, i) =>
              `<button class="slider-dot${i === 0 ? ' active' : ''}" data-i="${i}" aria-label="Bild ${i + 1}"></button>`
            ).join('');
            html += `
              <div class="section-label fade-up">Impressionen</div>
              <div class="gallery fade-up">
                <div class="slider" id="slider">
                  <div class="slider-track" id="slider-track">${slides}</div>
                  <button class="slider-btn prev" id="slider-prev" aria-label="Vorheriges Bild">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                  </button>
                  <button class="slider-btn next" id="slider-next" aria-label="Nächstes Bild">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                  </button>
                </div>
                <div class="slider-dots" id="slider-dots">${dots}</div>
                <div class="slider-caption" id="slider-caption">${esc(data.gallery[0].alt)}</div>
              </div>`;
          }

          // Termine links
          if (data.termine && data.termine.length) {
            html += `<div class="section-label fade-up">Termine</div>
              <div class="links fade-up">
                ${data.termine.map(t => renderLinkCard(t, false)).join('')}
              </div>`;
          }

          // Social links
          if (data.social && data.social.length) {
            html += `<div class="section-label fade-up">Social Media</div>
              <div class="links fade-up">
                ${data.social.map(s => renderLinkCard(s, true)).join('')}
              </div>`;
          }

          document.getElementById('content').innerHTML = html;

          // iCal download buttons
          document.querySelectorAll('.ical-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const ical = JSON.parse(btn.dataset.ical);
              generateIcal({ title: btn.dataset.title, desc: btn.dataset.desc, ical });
            });
          });

          // Init slider if gallery exists
          if (data.gallery && data.gallery.length > 1) {
            initSlider(data.gallery);
          }
        })
        .catch(() => {
          document.getElementById('content').innerHTML =
            '<p style="color:rgba(240,253,248,0.4);text-align:center;margin:2rem 0">Daten konnten nicht geladen werden.</p>';
        });

      function initSlider(gallery) {
        const track = document.getElementById('slider-track');
        const dots = document.getElementById('slider-dots');
        const caption = document.getElementById('slider-caption');
        const total = gallery.length;
        let current = 0;
        let autoTimer = null;
        let startX = 0;
        let deltaX = 0;
        let dragging = false;

        function goTo(i) {
          current = ((i % total) + total) % total;
          track.style.transform = `translateX(-${current * 100}%)`;
          dots.querySelectorAll('.slider-dot').forEach((d, idx) =>
            d.classList.toggle('active', idx === current)
          );
          caption.textContent = gallery[current].alt;
          resetAuto();
        }

        function next() { goTo(current + 1); }
        function prev() { goTo(current - 1); }

        function resetAuto() {
          clearInterval(autoTimer);
          autoTimer = setInterval(next, 5000);
        }

        document.getElementById('slider-prev').addEventListener('click', prev);
        document.getElementById('slider-next').addEventListener('click', next);
        dots.addEventListener('click', e => {
          const btn = e.target.closest('.slider-dot');
          if (btn) goTo(Number(btn.dataset.i));
        });

        // Touch / swipe support
        const slider = document.getElementById('slider');
        slider.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          dragging = true;
          track.classList.add('dragging');
          clearInterval(autoTimer);
        }, { passive: true });

        slider.addEventListener('touchmove', e => {
          if (!dragging) return;
          deltaX = e.touches[0].clientX - startX;
          const offset = -(current * 100) + (deltaX / slider.offsetWidth) * 100;
          track.style.transform = `translateX(${offset}%)`;
        }, { passive: true });

        slider.addEventListener('touchend', () => {
          if (!dragging) return;
          dragging = false;
          track.classList.remove('dragging');
          if (Math.abs(deltaX) > 50) {
            deltaX < 0 ? next() : prev();
          } else {
            goTo(current);
          }
          deltaX = 0;
        });

        // Keyboard
        document.addEventListener('keydown', e => {
          if (e.key === 'ArrowLeft') prev();
          if (e.key === 'ArrowRight') next();
        });

        resetAuto();
      }
    </script>

  </div>
</body>
</html>
